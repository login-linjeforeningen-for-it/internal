services:
  internal:
    container_name: internal
    image: internal
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../beekeeper/.env
      - .env
    environment:
      API_TOKEN: ${API_TOKEN:-}
      BACKUP_PATH: /backups
      DB: ${DB:-internal}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-internal}
      DEPLOY_ROOT: /workspace
      LOG_ALERTS_ENABLED: ${LOG_ALERTS_ENABLED:-false}
      NODE_ENV: production
      PORT: 8001
      SCOUTERBEE_PROJECT_ROOT: ${SCOUTERBEE_PROJECT_ROOT:-/workspace}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-local}
      S3_BUCKET: ${S3_BUCKET:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-local}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-local}
      TZ: Europe/Oslo
    volumes:
      - ${HOME}/.docker:/root/.docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx:/etc/nginx:ro
      - /usr/local/openresty/nginx:/usr/local/openresty/nginx:ro
      - internal_data:/app/data
      - /backups:/backups
      - ${LOGIN_WORKSPACE_ROOT:-..}:/workspace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/api >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    cpus: "2.0"

  postgres:
    image: postgres:18
    container_name: internal_database
    restart: always
    environment:
      POSTGRES_DB: ${DB:-internal}
      POSTGRES_USER: ${DB_USER:-internal}
    volumes:
      - internal_database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-internal} -d ${DB:-internal}"]
      interval: 5s
      retries: 5
    mem_limit: 1g
    cpus: "2.0"

volumes:
  internal_data:
  internal_database:
