services:
  internal:
    container_name: internal
    image: internal
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      API_TOKEN: ${API_TOKEN:-}
      BACKUP_PATH: /home/dev/backups
      DEPLOY_ROOT: /workspace
      LOG_ALERTS_ENABLED: ${LOG_ALERTS_ENABLED:-false}
      NODE_ENV: production
      PORT: 8001
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-local}
      S3_BUCKET: ${S3_BUCKET:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-local}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-local}
      TZ: Europe/Oslo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - internal_data:/app/data
      - internal_backups:/home/dev/backups
      - ${LOGIN_WORKSPACE_ROOT:-..}:/workspace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/api >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    cpus: "2.0"

volumes:
  internal_data:
  internal_backups:
